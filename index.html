<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>قارئ PDF الذكي - Smart PDF Reader</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Tajawal for Arabic -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <!-- Tesseract.js for OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-book-open-reader"></i>
                <h1>قارئ PDF</h1>
            </div>

            <div class="control-group">
                <label class="file-upload-btn">
                    <i class="fa-solid fa-file-pdf"></i> اختر ملف PDF
                    <input type="file" id="pdf-upload" accept="application/pdf">
                </label>
                <p id="file-name" class="file-name">لم يتم اختيار ملف</p>
            </div>

            <div class="control-group">
                <label for="voice-select">الصوت (Voice):</label>
                <div class="select-wrapper">
                    <select id="voice-select">
                        <option value="">جاري تحميل الأصوات...</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <label for="rate-slider">السرعة (Speed): <span id="rate-value">1.0</span>x</label>
                <input type="range" id="rate-slider" min="0.5" max="2" value="1" step="0.1">
            </div>

            <div class="control-group toggle-group">
                <label for="reverse-toggle" class="toggle-label" title="استخدم هذا إذا كانت الكلمات تظهر معكوسة">
                    عكس النص (إصلاح النص المقلوب)
                </label>
                <label class="switch">
                    <input type="checkbox" id="reverse-toggle">
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="playback-controls">
                <button id="btn-play" class="btn btn-primary" title="تشغيل" disabled>
                    <i class="fa-solid fa-play"></i> قراءة
                </button>
                <button id="btn-pause" class="btn btn-secondary" title="إيقاف مؤقت" disabled>
                    <i class="fa-solid fa-pause"></i>
                </button>
                <button id="btn-stop" class="btn btn-danger" title="إيقاف" disabled>
                    <i class="fa-solid fa-stop"></i>
                </button>
            </div>

            <div id="ocr-status" class="ocr-status hidden">
                <div class="ocr-status-header">
                    <i class="fa-solid fa-eye"></i>
                    <span id="ocr-status-text">جاري التعرف على النص...</span>
                </div>
                <div class="ocr-progress-bar">
                    <div class="ocr-progress-fill" id="ocr-progress-fill"></div>
                </div>
                <span class="ocr-progress-percent" id="ocr-progress-percent">0%</span>
            </div>

            <div class="extracted-text-preview">
                <label>النص المستخرج (Preview):</label>
                <textarea id="text-preview" readonly placeholder="سيظهر النص هنا..."></textarea>
            </div>
        </aside>

        <!-- Main PDF Viewer Area -->
        <main class="pdf-viewer">
            <div class="pdf-toolbar">
                <div class="pagination">
                    <button id="btn-prev" class="btn btn-icon" title="الصفحة السابقة" disabled>
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                    <span class="page-info">
                        صفحة <span id="page-num">0</span> من <span id="page-count">0</span>
                    </span>
                    <button id="btn-next" class="btn btn-icon" title="الصفحة التالية" disabled>
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                </div>
                <div class="zoom-controls">
                    <button id="btn-ocr" class="btn btn-icon btn-ocr-trigger" title="تشغيل OCR (التعرف على النص)" disabled>
                        <i class="fa-solid fa-eye"></i> OCR
                    </button>
                    <button id="btn-reader-mode" class="btn btn-icon" style="background: rgba(59, 130, 246, 0.2); border-radius: 4px; padding: 4px 8px;" title="وضع القراءة (إصلاح النص)" disabled>
                        <i class="fa-solid fa-book"></i> وضع القراءة
                    </button>
                    <button id="btn-zoom-out" class="btn btn-icon" title="تصغير" disabled>
                        <i class="fa-solid fa-magnifying-glass-minus"></i>
                    </button>
                    <button id="btn-zoom-in" class="btn btn-icon" title="تكبير" disabled>
                        <i class="fa-solid fa-magnifying-glass-plus"></i>
                    </button>
                </div>
            </div>
            
            <div class="canvas-container" id="canvas-container">
                <canvas id="pdf-canvas"></canvas>
                <div id="loading-spinner" class="spinner hidden">
                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                </div>
            </div>
            
            <div class="reader-mode-container hidden" id="reader-mode-container">
                <div class="reader-content" id="reader-mode-content"></div>
            </div>
        </main>
    </div>

    <div id="toast-notification" class="toast hidden">
        <i class="fa-solid fa-circle-exclamation toast-icon"></i>
        <span id="toast-message"></span>
    </div>

    <script src="script.js"></script>
</body>
</html>
